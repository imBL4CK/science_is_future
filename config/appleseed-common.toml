#General Settings
[General_Settings]
	#控制饱食度满时食用食物是否还计算营养值，默认false
	ignore_hunger = false

#Nutritions Settings
[Nutritions_Settings]
	#谷物初始营养值设置 默认50%
	# Default: 0.5
	# Range: 0.0 ~ 1.0
	grains_initial = 0.5
	#水果初始营养值设置 默认50%
	# Default: 0.5
	# Range: 0.0 ~ 1.0
	fruits_initial = 0.5
	#蔬菜初始营养值设置 默认50%
	# Default: 0.5
	# Range: 0.0 ~ 1.0
	vegetables_initial = 0.5
	#蛋白质初始营养值设置 默认50%
	# Default: 0.5
	# Range: 0.0 ~ 1.0
	proteins_initial = 0.5
	#糖类初始营养值设置 默认50%
	# Default: 0.5
	# Range: 0.0 ~ 1.0
	sugars_initial = 0.5

	#注意：效果范围配置现在默认从营养素数据文件读取。
	#如需覆盖，请删除前面的注释并取消#号注释并配置列表。
	#示例：grains_ranges = ["0-25:effect(minecraft:slowness,0)"]
	#优先级：此处配置（非注释且非空时） > 营养素数据文件配置
	[Nutritions_Settings.Effects_Override]
		#谷物营养值奖励节点设置 - 默认使用数据文件配置
		grains_ranges = []
		#水果营养值奖励节点设置 - 默认使用数据文件配置
		fruits_ranges = []
		#蔬菜营养值奖励节点设置 - 默认使用数据文件配置
		vegetables_ranges = []
		#蛋白质营养值奖励节点设置 - 默认使用数据文件配置
		proteins_ranges = []
		#糖类营养值奖励节点设置 - 默认使用数据文件配置
		sugars_ranges = []
